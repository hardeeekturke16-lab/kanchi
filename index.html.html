<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Kanchi ❤️</title>
<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#ff9a9e,#fad0c4);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}
.envelope{
  width:220px;
  height:150px;
  background:#ff6b81;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:20px;
  cursor:pointer;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}
.letter{
  position:absolute;
  background:white;
  padding:25px;
  width:90%;
  max-width:420px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 15px 35px rgba(0,0,0,0.2);
  display:none;
  z-index:2;
}
h2{ color:#ff4d6d; }
#text{ font-size:17px; line-height:1.6; min-height:120px; }
.name{ font-size:28px; color:#ff4d6d; text-shadow:0 0 10px #ff4d6d,0 0 20px #ff4d6d; display:none; }
.cake{ font-size:50px; cursor:pointer; display:none; margin-top:10px; }
#countdown{ margin-top:10px; font-size:16px; color:#ff4d6d; }
.buttons{ margin-top:20px; position:relative; height:80px; }
button{ padding:10px 18px; border:none; border-radius:10px; font-size:15px; cursor:pointer; margin:10px; }
#yes{ background:#ff4d6d; color:white; }
#no{ background:#888; color:white; position:absolute; }
.heart{ position:absolute; font-size:22px; animation:explode 1s ease forwards; }
@keyframes explode{0%{transform:scale(0);}100%{transform:translate(var(--x),var(--y));opacity:0;}}
.firework{ position:absolute; width:6px; height:6px; background:#ff4d6d; border-radius:50%; animation:boom 1s ease-out forwards; }
@keyframes boom{0%{transform:scale(1);}100%{transform:translate(var(--x),var(--y));opacity:0;}}
.rain{ position:absolute; color:#ff4d6d; font-size:20px; animation:fall 4s linear infinite; }
@keyframes fall{0%{transform:translateY(-10vh);opacity:1;}100%{transform:translateY(100vh);opacity:0;}}
#thankyou{ display:none; font-size:24px; color:#ff4d6d; margin-top:15px; text-shadow:0 0 10px #ff4d6d,0 0 20px #ff4d6d; }
</style>
</head>
<body>

<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=romantic-ambient-110397.mp3">
</audio>

<div class="envelope" onclick="openLetter()">💌 Tap to Open</div>

<div class="letter" id="letter">
  <h2>Sorry Kanchi 🥺</h2>
  <div class="name" id="name">Kanchi 💖</div>
  <p id="text"></p>
  <div id="countdown"></div>

  <div class="buttons">
    <button id="yes" onclick="forgive()">Forgive Me 💘</button>
    <button id="no" onmouseover="moveNo()" ontouchstart="moveNo()">No 😒</button>
  </div>

  <div class="cake" id="cake" onclick="celebrate()">🎂</div>
  <p id="birthday" style="display:none;color:#ff4d6d;">🎉 Happy Early Birthday Kanchi 🎉<br>11 March ko milte hain ❤️</p>

  <div id="thankyou">❤️ Thank you for forgiving me Kanchi! ❤️</div>
</div>

<script>
const message=`Tuje pata hai na mai jaan bujhke galti nahi karta,
bas kabhi kabhi mujhse ho jati hai.

Agle baar se mai dhyan rakhuga.
Ab maaf bhi karde muje.

Aur Wednesday ko tera birthday bhi aa raha hai.
I promise ki mai tujhe us din jarur milne aaunga.

Tu to darling hai na meri 💖`;

let i=0;
function typing(){
  if(i<message.length){
    document.getElementById("text").innerHTML+=message.charAt(i);
    i++;
    setTimeout(typing,40);
  }
}

function openLetter(){
  document.querySelector(".envelope").style.display="none";
  document.getElementById("letter").style.display="block";
  document.getElementById("music").play();
  heartExplosion();
  typing();
  startCountdown();
}

/* No button running */
function moveNo(){
  let btn=document.getElementById("no");
  let x=Math.random()*250;
  let y=Math.random()*60;
  btn.style.left=x+"px";
  btn.style.top=y+"px";
}

/* Forgive → Heart rain + show name */
function forgive(){
  document.getElementById("name").style.display="block";
  document.getElementById("cake").style.display="block";
  heartRain();
}

/* Birthday cake → fireworks + birthday + thank you */
function celebrate(){
  document.getElementById("birthday").style.display="block";
  fireworks();
  setTimeout(()=>{document.getElementById("thankyou").style.display="block";},1200);
}

/* Heart explosion on opening envelope */
function heartExplosion(){
  for(let i=0;i<20;i++){
    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="💖";
    let x=(Math.random()*400-200)+"px";
    let y=(Math.random()*400-200)+"px";
    heart.style.setProperty('--x',x);
    heart.style.setProperty('--y',y);
    heart.style.left="50%";
    heart.style.top="50%";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),1000);
  }
}

/* Fireworks */
function fireworks(){
  for(let i=0;i<40;i++){
    let fw=document.createElement("div");
    fw.className="firework";
    let x=(Math.random()*400-200)+"px";
    let y=(Math.random()*400-200)+"px";
    fw.style.setProperty('--x',x);
    fw.style.setProperty('--y',y);
    fw.style.left="50%";
    fw.style.top="50%";
    document.body.appendChild(fw);
    setTimeout(()=>fw.remove(),1000);
  }
}

/* Heart rain */
function heartRain(){
  setInterval(()=>{
    let heart=document.createElement("div");
    heart.className="rain";
    heart.innerHTML="💖";
    heart.style.left=Math.random()*100+"vw";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),4000);
  },300);
}

/* Birthday countdown */
function startCountdown(){
  let birthday=new Date(new Date().getFullYear(),2,11); // March=2
  setInterval(()=>{
    let now=new Date();
    let diff=birthday-now;
    if(diff<0){ birthday=new Date(new Date().getFullYear()+1,2,11); diff=birthday-now; }
    let days=Math.floor(diff/(1000*60*60*24));
    let hours=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
    let minutes=Math.floor((diff%(1000*60*60))/(1000*60));
    document.getElementById("countdown").innerHTML=
      "⏳ Birthday Countdown: "+days+"d "+hours+"h "+minutes+"m";
  },1000);
}
</script>

</body>
</html>
